<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Las Recetas de Kenna</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    line-height: 1.6;
    color: #333;
    background-color: #fdfbf7;
    min-height: 100vh;
}

.container {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem;
}

header {
    text-align: center;
    margin-bottom: 3rem;
    padding-bottom: 2rem;
    border-bottom: 2px solid #e0dcd0;
}

h1 {
    color: #5d4037;
    font-size: 2.8rem;
    margin-bottom: 0.5rem;
    font-weight: 700;
}

.subtitle {
    color: #8d6e63;
    font-size: 1.1rem;
    font-style: italic;
}

.language-switcher {
    margin-top: 2rem;
    padding-top: 1rem;
    border-top: 1px solid #e0dcd0;
    text-align: center;
}

.language-switcher a {
    color: #795548;
    text-decoration: none;
    font-weight: 500;
    margin: 0 1rem;
    padding: 0.5rem 1rem;
    border-radius: 4px;
    display: inline-block;
    transition: all 0.3s ease;
}

.language-switcher a.active {
    background: #e8d4c4;
    color: #5d4037;
}

.language-switcher a:hover {
    background: #f5e6d3;
}

main {
    padding: 2rem 0;
}

.recipe-category {
    margin-bottom: 3rem;
    background: #fff;
    padding: 2rem;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    border-left: 4px solid #c49a7f;
}

.recipe-category h2 {
    color: #5d4037;
    font-size: 1.6rem;
    margin-bottom: 1.5rem;
    padding-bottom: 0.5rem;
    border-bottom: 2px solid #f5f2eb;
}

.recipes-list {
    list-style: none;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 1rem;
}

.recipe-item {
    padding: 1rem;
    background: #fef5f1;
    border-radius: 6px;
    border: 1px solid #f0e6dd;
    transition: all 0.3s ease;
}

.recipe-item:hover {
    background: #fff5f0;
    box-shadow: 0 4px 12px rgba(197, 154, 127, 0.2);
    transform: translateY(-2px);
}

.recipe-item a {
    color: #795548;
    text-decoration: none;
    font-weight: 500;
    font-size: 1.1rem;
    display: block;
    padding: 0.5rem 0;
}

.recipe-item a:hover {
    color: #5d4037;
    text-decoration: underline;
}

.empty-state {
    text-align: center;
    padding: 3rem 2rem;
    color: #999;
}

.empty-state h2 {
    color: #bbb;
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
}

.empty-state p {
    color: #ccc;
}

footer {
    text-align: center;
    padding: 2rem;
    color: #999;
    border-top: 1px solid #e0dcd0;
    margin-top: 3rem;
    font-size: 0.9rem;
}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🥘 Las Recetas de Kenna</h1>
            <p class="subtitle">Una colección de deliciosas recetas caseras</p>
            
            <div class="language-switcher">
                <a href="index.html">English</a>
                <a href="index-es.html" class="active">Español</a>
            </div>
        </header>

        <main id="recipe-directory">
            <!-- SOPAS CATEGORY -->
            <div class="recipe-category">
                <h2>🥣 Sopas</h2>
                <ul class="recipes-list">
                    <li class="recipe-item">
                        <a href="gazpacho-es.html">Receta Fácil de Gazpacho</a>
                    </li>
                </ul>
            </div>

            <!-- PLATOS PRINCIPALES CATEGORY -->
            <div class="recipe-category">
                <h2>🍝 Platos Principales</h2>
                <ul class="recipes-list">
                    <li class="recipe-item">
                        <a href="wild-mushroom-risotto-es.html">Risotto de Hongos Silvestres Secos</a>
                    </li>
                    <li class="recipe-item">
                        <a href="filet-mignon-es.html">Filete Mignon Perfecto</a>
                    </li>
                </ul>
            </div>

            <!-- EMPTY STATE - Show when no recipes in any category -->\n            <div class="empty-state" id="empty-state" style="display: none;">
                <h2>Aún no hay recetas</h2>
                <p>¡Vuelve pronto! 🥘</p>
            </div>
        </main>

        <footer>
            <p>Hecho con ❤️ para Kenna</p>
        </footer>
    </div>
</body>
</html>
